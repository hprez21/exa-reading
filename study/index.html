<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>English Practice — Reading & Vocabulary</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <h1>🦝📚 English Practice Time!</h1>
    <p class="sub">Vocabulary & Reading Comprehension — 2nd Grade</p>
    <div id="totalScore" class="total-score">⭐ Total stars: <span id="starCount">0</span></div>
    <button id="esToggle" class="es-toggle">🇲🇽 Ayuda en Español</button>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="vocab1">1. Vocabulary Match</button>
    <button class="tab" data-tab="vocab2">2. Fill the Blank</button>
    <button class="tab" data-tab="vocab3">3. My Words to Know</button>
    <button class="tab" data-tab="read1">4. The Raccoon</button>
    <button class="tab" data-tab="read2">5. Stone Soup</button>
    <button class="tab" data-tab="read3">6. The Abenaki</button>
    <button class="tab" data-tab="folktale">7. Folktales Quiz</button>
    <button class="tab" data-tab="exam">8. Exam Simulation</button>
  </nav>

  <main id="content"></main>

  <footer>
    <button id="resetAll" class="btn-reset">🔄 Start Over</button>
    <p class="tip">💡 Tip: Read carefully. Take your time. You can try again!</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
